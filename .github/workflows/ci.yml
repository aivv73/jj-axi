name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  check:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - macos-15-intel
          - macos-15

    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Rust 1.89
        run: rustup toolchain install 1.89.0 --profile minimal --component rustfmt --no-self-update

      - name: Select Rust 1.89
        run: rustup default 1.89.0

      - name: Install Jujutsu 0.43.0
        shell: bash
        run: |
          case "$(uname -s)-$(uname -m)" in
            Linux-x86_64)
              target=x86_64-unknown-linux-musl
              expected_sha256=59e5588583ac82b623239929368c65b90735931c0f26b5a16c1f04d5bb97643d
              ;;
            Linux-aarch64)
              target=aarch64-unknown-linux-musl
              expected_sha256=289197b6bec60b4e57d47260624b617716f737eb02cdfd9155791b2576aa5862
              ;;
            Darwin-x86_64)
              target=x86_64-apple-darwin
              expected_sha256=f1a7fec046b816132318c07a9c096680f7aae78b008709c7166a57efd9c579ec
              ;;
            Darwin-arm64)
              target=aarch64-apple-darwin
              expected_sha256=84336bbe5673a36ccc6395c494021ba632794da078eb8c8c513a60f8e1cc3083
              ;;
            *) echo "Unsupported runner: $(uname -s)-$(uname -m)" >&2; exit 1 ;;
          esac
          archive="jj-v0.43.0-${target}.tar.gz"
          archive_path="${RUNNER_TEMP}/${archive}"
          curl --proto '=https' --tlsv1.2 --fail --location --silent --show-error \
            "https://github.com/jj-vcs/jj/releases/download/v0.43.0/${archive}" \
            --output "${archive_path}"
          actual_sha256=$(shasum -a 256 "${archive_path}" | awk '{print $1}')
          if [[ "${actual_sha256}" != "${expected_sha256}" ]]; then
            echo "SHA-256 mismatch for ${archive}: expected ${expected_sha256}, got ${actual_sha256}" >&2
            exit 1
          fi
          mkdir "${RUNNER_TEMP}/jj-bin"
          tar -xzf "${archive_path}" -C "${RUNNER_TEMP}/jj-bin" ./jj
          echo "${RUNNER_TEMP}/jj-bin" >> "${GITHUB_PATH}"

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Check compilation
        run: cargo check --locked

      - name: Run tests
        run: cargo test --locked

      - name: Check Cargo package
        if: runner.os == 'Linux'
        run: cargo package --locked

      - name: Check whitespace errors
        run: git diff --check
