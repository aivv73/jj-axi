name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-musl
          - os: macos-15-intel
            target: x86_64-apple-darwin
          - os: macos-15
            target: aarch64-apple-darwin

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate tag version
        shell: bash
        run: |
          package_version=$(grep -m1 '^version = ' Cargo.toml | cut -d '"' -f2)
          test "${GITHUB_REF_NAME}" = "v${package_version}" || {
            echo "Tag ${GITHUB_REF_NAME} does not match package version ${package_version}" >&2
            exit 1
          }

      - name: Install Linux linker
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install --yes musl-tools

      - name: Install Rust 1.89
        run: rustup toolchain install 1.89.0 --profile minimal --target ${{ matrix.target }} --no-self-update

      - name: Select Rust 1.89
        run: rustup default 1.89.0

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package release binary
        shell: bash
        run: |
          archive="jj-axi-${GITHUB_REF_NAME}-${{ matrix.target }}.tar.gz"
          mkdir staging dist
          cp "target/${{ matrix.target }}/release/jj-axi" staging/
          cp README.md LICENSE staging/
          tar -czf "dist/${archive}" -C staging jj-axi README.md LICENSE

      - name: Upload release archive
        uses: actions/upload-artifact@v4
        with:
          name: jj-axi-${{ matrix.target }}
          path: dist/*.tar.gz
          if-no-files-found: error

  publish:
    name: Publish experimental release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download release archives
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate SHA-256 checksums
        run: cd dist && sha256sum *.tar.gz > SHA256SUMS

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" dist/* \
            --repo "${GITHUB_REPOSITORY}" \
            --verify-tag \
            --prerelease \
            --title "${GITHUB_REF_NAME} (experimental)" \
            --notes "Experimental release. Verify downloaded archives against SHA256SUMS before installation."
